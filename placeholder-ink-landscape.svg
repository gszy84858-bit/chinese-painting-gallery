<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Temporary Chinese ink landscape painting</title>
  <desc id="desc">A refined placeholder artwork inspired by Chinese ink painting, with mountains, mist, bamboo, and a red seal.</desc>
  <defs>
    <radialGradient id="paper" cx="45%" cy="25%" r="80%">
      <stop offset="0" stop-color="#fbf7eb"/>
      <stop offset="0.55" stop-color="#f0e6d2"/>
      <stop offset="1" stop-color="#d8c7a8"/>
    </radialGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="5" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
    <filter id="inkBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <linearGradient id="mist" x1="0" x2="1">
      <stop offset="0" stop-color="#f4eee0" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#f4eee0" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#f4eee0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1600" fill="url(#paper)"/>
  <rect width="1200" height="1600" filter="url(#grain)" opacity="0.55"/>
  <rect x="74" y="72" width="1052" height="1456" fill="none" stroke="#3b3326" stroke-opacity="0.16" stroke-width="3"/>

